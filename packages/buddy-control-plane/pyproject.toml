[project]
name = "buddy-control-plane"
version = "0.0.1"
description = "Buddy control-plane service"
requires-python = ">=3.13"
dependencies = [
    "python-dotenv>=1.2.1",
    "fastapi[standard]>=0.128.2",
    "docker>=7.1.0",
    "requests>=2.32.5",
    "httpx>=0.28.1",
    "pydantic>=2.12.5",
    "buddy-shared",
]

[tool.uv.sources]
buddy-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/buddy"]
