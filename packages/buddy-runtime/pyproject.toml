[project]
name = "buddy-runtime"
version = "0.0.1"
description = "Buddy runtime agent service"
requires-python = ">=3.13"
dependencies = [
    "a2a-sdk>=0.3.22",
    "python-dotenv>=1.2.1",
    "pydantic-ai>=1.56.0",
    "pydantic-ai-slim[google]>=1.56.0",
    "fastapi[standard]>=0.128.2",
    "devtools>=0.12.2",
    "langfuse>=3.12.1",
    "docker>=7.1.0",
    "requests>=2.32.5",
    "httpx>=0.28.1",
    "spotipy>=2.25.2",
    "fastmcp>=2.14.5",
    "beautifulsoup4>=4.14.3",
    "cloudscraper>=1.2.71",
    "openai>=2.17.0",
    "buddy-shared",
]

[tool.uv.sources]
buddy-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/buddy"]
